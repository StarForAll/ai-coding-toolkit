version: 1
library:
  id: trellis-library
  title: Trellis Reusable Asset Library
  description: Reusable specs, templates, checklists, examples, schemas, and scripts for Trellis-based project initialization
  status: active
  owners:
  - xzc
  default_language: en
policies:
  require_manifest_registration: true
  require_unique_ids: true
  require_reverse_links: true
  require_related_asset_check: true
  allow_unregistered_files: false
  sync_mode: validate-and-suggest
  deletion_policy: block-if-referenced
  rename_policy: require-explicit-migration
  version_bump_policy: semantic
  allowed_direct_cross_axis_refs:
  - spec.technologies.frameworks.vue-component-model->spec.platforms.web-accessibility
  - spec.technologies.frameworks.vue-routing->spec.platforms.web-routing-and-url
  - spec.technologies.frameworks.react-component-model->spec.platforms.web-accessibility
  - spec.technologies.frameworks.react-routing->spec.platforms.web-routing-and-url
enums:
  asset_types:
  - spec
  - template
  - checklist
  - example
  - schema
  - script
  asset_formats:
  - file
  - directory
  asset_statuses:
  - draft
  - active
  - deprecated
  - archived
  domain_axes:
  - universal-domains
  - scenarios
  - platforms
  - technologies
  atomicity_levels:
  - simple
  - complex
  relation_kinds:
  - depends-on
  - verified-by
  - implements-template-for
  - includes
  - extends
  - conflicts-with
  - replaced-by
  - related-to
  sync_policies:
  - none
  - validate-reference
  - review-on-change
  - auto-update-metadata
  - block-on-break
