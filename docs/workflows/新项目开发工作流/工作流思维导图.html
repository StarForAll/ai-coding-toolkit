/* ═══════════════ LAYOUT ENGINE — measure-first, bidirectional ═══════════════ */

const VGAP = [60, 28, 18];  // vertical gaps by depth: phases 60, details 28, commands 18
function gv(d) { return VGAP[Math.min(d, VGAP.length - 1)]; }
const COL_GAP = 60;         // horizontal gap between columns

// ── Step 1: Build flat maps ──
const rightKids = tree[0].children.filter(c => !c.side || c.side !== 'left');
const leftKids  = tree[0].children.filter(c => c.side === 'left');
const rFlat = {}, lFlat = {};

function walkSide(items, flat, parentId, depth) {
  items.forEach(item => {
    const n = { ...item, _depth: depth, _parent: parentId, _kids: [], _top: 0, _h: 0 };
    flat[item.id] = n;
    if (parentId && flat[parentId]) flat[parentId]._kids.push(item.id);
    if (item.children) walkSide(item.children, flat, item.id, depth + 1);
  });
}
walkSide(rightKids, rFlat, 'root', 1);
walkSide(leftKids,  lFlat, 'root', 1);

// ── Step 2: Render ALL nodes off-screen to measure real heights ──
const elMap = {};
const measureBox = document.createElement('div');
measureBox.style.cssText = 'position:fixed;top:-99999px;left:-99999px;visibility:hidden;';
document.body.appendChild(measureBox);

function renderInner(n) {
  if (n.sub) return n.html + n.sub;
  if (n.bdesc) return n.html + '<div class="bdesc">' + n.bdesc + '</div>' + (n.btrig ? '<div class="btrig">' + n.btrig + '</div>' : '');
  if (n.det) return n.html + '<div class="det">' + n.det + '</div>';
  if (n.cp) return '<div class="cn">' + n.html + '</div><div class="cp">' + n.cp + '</div>' + (n.cd ? '<div class="cd">' + n.cd + '</div>' : '');
  if (n.su) return '<div class="sn">' + n.html + '</div><div class="su">' + n.su + '</div>';
  return n.html;
}

function measureNode(id, cls, html) {
  const div = document.createElement('div');
  div.className = 'nd ' + (cls || 'L2');
  div.innerHTML = html;
  measureBox.appendChild(div);
  const h = div.offsetHeight;
  const w = div.offsetWidth;
  measureBox.removeChild(div);
  return { h, w };
}

// Root node
const rootMeasure = measureNode('root', 'L0', tree[0].html);
const ROOT_H = rootMeasure.h;
const ROOT_W = rootMeasure.w;

// Measure and store own heights for all nodes
function measureAll(flat) {
  Object.keys(flat).forEach(id => {
    const n = flat[id];
    const m = measureNode(id, n.cls || 'L2', renderInner(n));
    n._ownH = m.h;  // node's own rendered height
    n._h = m.h;     // will become subtree height after subH
    n._w = m.w;
  });
}
measureAll(rFlat);
measureAll(lFlat);

// ── Step 3: Compute subtree heights bottom-up ──
function subH(flat, id) {
  const n = flat[id];
  if (!n._kids.length) return n._h;
  let h = 0;
  n._kids.forEach((cid, i) => {
    h += subH(flat, cid);
    if (i) h += gv(n._depth);
  });
  n._h = Math.max(h, n._ownH);  // _h = subtree total height
  return n._h;
}
Object.keys(rFlat).forEach(id => { if (rFlat[id]._parent === 'root') subH(rFlat, id); });
Object.keys(lFlat).forEach(id => { if (lFlat[id]._parent === 'root') subH(lFlat, id); });

// ── Step 4: Placement — bottom-up, parent always centered on children ──
// placeBlock: place subtree rooted at `id` starting at `top`, return bottom y
function placeBlock(flat, id, top) {
  const n = flat[id];
  if (!n._kids.length) {
    n._top = top;
    return top + n._h;
  }
  // Place children sequentially
  let cursor = top;
  n._kids.forEach((cid, i) => {
    cursor = placeBlock(flat, cid, cursor);
    if (i < n._kids.length - 1) cursor += gv(n._depth);
  });
  // Center parent on children (use own height, not subtree height)
  const fk = flat[n._kids[0]];
  const lk = flat[n._kids[n._kids.length - 1]];
  n._top = (fk._top + lk._top + lk._h) / 2 - n._ownH / 2;
  return cursor; // bottom of last child
}

// Place RIGHT side: sequential from top
const rRoots = Object.keys(rFlat).filter(id => rFlat[id]._parent === 'root');
let rCursor = 40;
rRoots.forEach((id, i) => {
  rCursor = placeBlock(rFlat, id, rCursor);
  if (i < rRoots.length - 1) rCursor += gv(0);
});
const rFirst = rFlat[rRoots[0]];
const rLast  = rFlat[rRoots[rRoots.length - 1]];
const rCenter = (rFirst._top + rLast._top + rLast._h) / 2;

// Place LEFT side: centered at same vertical position as right side
const lRoots = Object.keys(lFlat).filter(id => lFlat[id]._parent === 'root');
const lBranchH = lRoots.reduce((s, id) => s + lFlat[id]._h, 0) + (lRoots.length - 1) * gv(0);
let lCursor = rCenter - lBranchH / 2;
lRoots.forEach((id, i) => {
  lCursor = placeBlock(lFlat, id, lCursor);
  if (i < lRoots.length - 1) lCursor += gv(0);
});

// ── Step 5: Create DOM elements and position them ──

// Create root node
const rootEl = document.createElement('div');
rootEl.id = 'nd-root';
rootEl.className = 'nd L0';
rootEl.innerHTML = tree[0].html;
rootEl.style.left = '900px';  // center in viewport, leaving room for left branches
rootEl.style.top = '0px';
W.appendChild(rootEl);
elMap['root'] = rootEl;

function makeEl(n) {
  const div = document.createElement('div');
  div.id = 'nd-' + n.id;
  div.className = 'nd ' + (n.cls || 'L2');
  div.innerHTML = renderInner(n);
  div.style.top = n._top + 'px';
  div.style.left = '0px';
  W.appendChild(div);
  elMap[n.id] = div;
}
Object.keys(rFlat).forEach(id => makeEl(rFlat[id]));
Object.keys(lFlat).forEach(id => makeEl(lFlat[id]));

// Re-center all parent nodes using actual rendered heights
function recenterAll(flat) {
  // Process bottom-up: leaves first, then parents
  const ids = Object.keys(flat);
  const processed = new Set();
  function recenter(id) {
    const n = flat[id];
    if (processed.has(id)) return;
    if (n._kids.length) {
      n._kids.forEach(cid => recenter(cid));
      const fkEl = elMap[n._kids[0]];
      const lkEl = elMap[n._kids[n._kids.length - 1]];
      const kidsCenter = (fkEl.offsetTop + lkEl.offsetTop + lkEl.offsetHeight) / 2;
      const parentH = elMap[id].offsetHeight;
      elMap[id].style.top = (kidsCenter - parentH / 2) + 'px';
      n._top = kidsCenter - parentH / 2;
    }
    processed.add(id);
  }
  ids.forEach(id => recenter(id));
}
recenterAll(rFlat);
recenterAll(lFlat);

// Center root vertically between left and right
const lFirst = lFlat[lRoots[0]];
const lLast  = lFlat[lRoots[lRoots.length - 1]];
const allMins = [rFirst._top, lFirst ? lFirst._top : Infinity];
const allMaxs = [rLast._top + rLast._h, lLast ? lLast._top + lLast._h : -Infinity];
const globalCenter = (Math.min(...allMins) + Math.max(...allMaxs)) / 2;
rootEl.style.top = (globalCenter - rootEl.offsetHeight / 2) + 'px';

// Position X: right side
const rChildMap = {};
Object.keys(rFlat).forEach(id => { if (rFlat[id]._kids.length) rChildMap[id] = rFlat[id]._kids; });
const lChildMap = {};
Object.keys(lFlat).forEach(id => { if (lFlat[id]._kids.length) lChildMap[id] = lFlat[id]._kids; });

rRoots.forEach(id => {
  elMap[id].style.left = (parseInt(rootEl.style.left) + rootEl.offsetWidth + COL_GAP) + 'px';
});
Object.keys(rChildMap).forEach(pid => {
  const pEl = elMap[pid];
  rChildMap[pid].forEach(cid => {
    elMap[cid].style.left = (parseInt(pEl.style.left) + pEl.offsetWidth + COL_GAP) + 'px';
  });
});

// Position X: left side
lRoots.forEach(id => {
  elMap[id].style.left = (parseInt(rootEl.style.left) - elMap[id].offsetWidth - COL_GAP) + 'px';
});
Object.keys(lChildMap).forEach(pid => {
  const pEl = elMap[pid];
  lChildMap[pid].forEach(cid => {
    elMap[cid].style.left = (parseInt(pEl.style.left) - elMap[cid].offsetWidth - COL_GAP) + 'px';
  });
});

// Remove measuring box
document.body.removeChild(measureBox);

// ── Step 6: Build edges ──
const allEdges = [];
Object.keys(rFlat).forEach(id => { allEdges.push({ from: rFlat[id]._parent || 'root', to: id, side: 'right' }); });
Object.keys(lFlat).forEach(id => { allEdges.push({ from: lFlat[id]._parent || 'root', to: id, side: 'left' }); });

// Canvas size
let mxR = 0, mxB = 0, mxL = Infinity;
Object.keys(elMap).forEach(id => {
  const el = elMap[id];
  mxR = Math.max(mxR, el.offsetLeft + el.offsetWidth);
  mxB = Math.max(mxB, el.offsetTop + el.offsetHeight);
  mxL = Math.min(mxL, el.offsetLeft);
});
const shift = Math.max(0, 60 - mxL);
if (shift > 0) {
  Object.keys(elMap).forEach(id => {
    elMap[id].style.left = (parseInt(elMap[id].style.left) + shift) + 'px';
  });
  mxR += shift;
}
W.style.width = (mxR + 60) + 'px';
W.style.height = (mxB + 60) + 'px';
sv.setAttribute('width', W.style.width);
sv.setAttribute('height', W.style.height);

/* ═══════════════ SVG EDGES — spec 4.3 ═══════════════ */

const phC = { p1:'#ff9e64', p2:'#7aa2f7', p3:'#bb9af7', p4:'#2ac3de', p5:'#9ece6a', p6:'#f7768e', p7:'#e0af68' };

allEdges.forEach(e => {
  const fEl = elMap[e.from], tEl = elMap[e.to];
  if (!fEl || !tEl) return;
  const isL = e.side === 'left';
  let fx, fy, tx, ty;
  if (isL) {
    fx = fEl.offsetLeft; fy = fEl.offsetTop + fEl.offsetHeight / 2;
    tx = tEl.offsetLeft + tEl.offsetWidth; ty = tEl.offsetTop + tEl.offsetHeight / 2;
  } else {
    fx = fEl.offsetLeft + fEl.offsetWidth; fy = fEl.offsetTop + fEl.offsetHeight / 2;
    tx = tEl.offsetLeft; ty = tEl.offsetTop + tEl.offsetHeight / 2;
  }
  const cpx = isL ? fx - 40 : fx + 40;
  const p = document.createElementNS(svgNS, 'path');
  p.setAttribute('d', `M ${fx} ${fy} C ${cpx} ${fy}, ${cpx} ${ty}, ${tx} ${ty}`);
  p.setAttribute('fill', 'none');
  let col = '#30363d', sw = 1.2;
  if (e.from === 'root') {
    if (!isL) { col = phC[e.to] || '#30363d'; sw = 2; }
    else { col = '#d2a8ff'; sw = 1.8; }
  }
  p.setAttribute('stroke', col); p.setAttribute('stroke-width', sw);
  p.setAttribute('opacity', '0.55');
  sv.appendChild(p);
});
</script>
</body>
</html>
